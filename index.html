// ═══ MINI CALENDAR COMPONENT ═══
function MiniCal({selected,onSelect,allowPast}){
  const[cY,setCY]=useState(new Date().getFullYear());
  const[cM,setCM]=useState(new Date().getMonth());
  const goP=()=>{var m=cM-1,y=cY;if(m<0){m=11;y--;}setCM(m);setCY(y);};
  const goN=()=>{var m=cM+1,y=cY;if(m>11){m=0;y++;}setCM(m);setCY(y);};
  var first=new Date(cY,cM,1);var sd=first.getDay();sd=sd===0?6:sd-1;
  var dim=new Date(cY,cM+1,0).getDate();var ts=todayS();
  var days=[];
  for(var i=0;i<sd;i++)days.push({d:'',ds:'',ot:true});
  for(var d=1;d<=dim;d++){var ds=cY+'-'+String(cM+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');days.push({d:d,ds:ds,ot:false});}
  return(<div style={{background:'white',borderRadius:8,overflow:'hidden',border:'1.5px solid #d8e0f0'}}>
    <div style={{background:'#003087',color:'white',padding:'9px 12px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
      <button onClick={goP} style={{background:'rgba(255,255,255,.15)',border:'none',color:'white',width:30,height:30,borderRadius:'50%',cursor:'pointer',fontSize:18,lineHeight:'30px',textAlign:'center'}}>‹</button>
      <div style={{fontSize:14,fontWeight:700,letterSpacing:1.5,textTransform:'uppercase'}}>{MESI[cM]} {cY}</div>
      <button onClick={goN} style={{background:'rgba(255,255,255,.15)',border:'none',color:'white',width:30,height:30,borderRadius:'50%',cursor:'pointer',fontSize:18,lineHeight:'30px',textAlign:'center'}}>›</button>
    </div>
    <div style={{padding:8}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2,marginBottom:4}}>{GIORNI.map((g,i)=><div key={i} style={{textAlign:'center',fontSize:12,fontWeight:700,color:'#6b7fa3',padding:4}}>{g}</div>)}</div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2}}>
        {days.map((day,i)=>{
          if(!day.d)return <div key={i} style={{height:34}}/>;
          var isT=day.ds===ts;var isS=day.ds===selected;var isPast=day.ds<ts;
          var ok=allowPast?true:!isPast;
          var bg='transparent';var col='#1a2744';var fw=600;var op=1;
          if(isS){bg='#003087';col='white';fw=800;}
          else if(isT){bg='#efdf00';col='#0d1f3c';fw=800;}
          else if(isPast&&!allowPast){col='#ccd';op=0.4;}
          return(<div key={i} onClick={()=>{if(ok)onSelect(day.ds);}} style={{height:34,display:'flex',alignItems:'center',justifyContent:'center',borderRadius:6,cursor:ok?'pointer':'default',fontSize:14,fontWeight:fw,background:bg,color:col,opacity:op}}>{day.d}</div>);
        })}
      </div>
    </div>
  </div>);
}

// ═══ ORDINA RICAMBI POPUP ═══
function OrdinaRicambiPopup({pratica,onConfirm,onCancel,onChange,onSkip}){
  const ric=pratica.ricambi||[];
  const[allegati,setAllegati]=useState([]);
  const addR=()=>onChange({...pratica,ricambi:[...ric,{nome:'',codice:''}]});
  const updR=(i,k,v)=>{const a=[...ric];a[i]={...a[i],[k]:v};onChange({...pratica,ricambi:a});};
  const delR=i=>{const a=[...ric];a.splice(i,1);onChange({...pratica,ricambi:a});};
  const inp={border:'1.5px solid #d8e0f0',borderRadius:4,padding:'6px 8px',fontSize:14,color:'#1a2744',background:'#eef1f8',outline:'none',width:'100%'};
  const valid=ric.length>0&&ric.every(r=>r.nome&&r.nome.trim());
  const handleFiles=function(e){
    var files=Array.from(e.target.files||[]);
    var newAll=files.map(function(f){return{nome:f.name,size:Math.round(f.size/1024)};});
    setAllegati(allegati.concat(newAll));
    e.target.value='';
  };
  const removeFile=function(idx){var a=allegati.slice();a.splice(idx,1);setAllegati(a);};
  return(<div onClick={e=>{if(e.target===e.currentTarget)onCancel();}} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.6)',zIndex:500,display:'flex',alignItems:'center',justifyContent:'center',padding:14}}>
    <div style={{background:'white',borderRadius:14,maxWidth:500,width:'100%',overflow:'hidden'}}>
      <div style={{background:'linear-gradient(135deg,#f59e0b,#d97706)',padding:'18px 22px',color:'white'}}>
        <div style={{fontSize:18,fontWeight:800,letterSpacing:1}}>📦 Ordina Ricambi</div>
        <div style={{fontSize:14,color:'rgba(255,255,255,.8)',marginTop:3}}>{pratica.cognome} {pratica.nome} · <strong>{pratica.targa}</strong> · {pratica.modello||'—'}</div>
      </div>
      <div style={{padding:'16px 22px',maxHeight:'50vh',overflowY:'auto'}}>
        <div style={{fontSize:14,fontWeight:700,textTransform:'uppercase',letterSpacing:1,color:'#6b7fa3',marginBottom:8}}>Lista ricambi da ordinare</div>
        {ric.length===0&&<div style={{textAlign:'center',padding:'16px 0',color:'#6b7fa3',fontSize:14,fontStyle:'italic'}}>Aggiungi i ricambi necessari</div>}
        {ric.map((r,idx)=>(
          <div key={idx} style={{display:'flex',gap:7,alignItems:'center',padding:'7px 0',borderBottom:idx<ric.length-1?'1px dashed #e5eaf5':'none'}}>
            <div style={{background:'#f59e0b',color:'white',width:20,height:20,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,fontWeight:800,flexShrink:0}}>{idx+1}</div>
            <div style={{flex:2}}><div style={{fontSize:14,fontWeight:700,color:'#6b7fa3',marginBottom:2}}>RICAMBIO *</div><input value={r.nome||''} onChange={e=>updR(idx,'nome',e.target.value)} placeholder="es. Paraurti anteriore" style={inp}/></div>
            <div style={{flex:1}}><div style={{fontSize:14,fontWeight:700,color:'#6b7fa3',marginBottom:2}}>CODICE</div><input value={r.codice||''} onChange={e=>updR(idx,'codice',e.target.value)} placeholder="OEM" style={inp}/></div>
            <button onClick={()=>delR(idx)} style={{background:'#fee2e2',color:'#ef4444',border:'none',width:20,height:20,borderRadius:'50%',cursor:'pointer',fontSize:14,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',marginTop:14}}>✕</button>

        {/* ALLEGATI PDF */}
        <div style={{marginTop:14,borderTop:'2px solid #e5eaf5',paddingTop:12}}>
          <div style={{fontSize:14,fontWeight:700,textTransform:'uppercase',letterSpacing:1,color:'#6b7fa3',marginBottom:8}}>📎 Allegati PDF</div>
          {allegati.length>0&&<div style={{marginBottom:8}}>
            {allegati.map(function(f,i){return(
              <div key={i} style={{display:'flex',alignItems:'center',gap:8,padding:'5px 8px',background:'#f0f4ff',borderRadius:5,marginBottom:4,border:'1px solid #c7d2fe'}}>

                </div>
                <button onClick={function(){removeFile(i);}} style={{background:'#fee2e2',color:'#ef4444',border:'none',width:18,height:18,borderRadius:'50%',cursor:'pointer',fontSize:14,display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
              </div>

        {ric.length>0&&<span style={{fontSize:14,fontWeight:700,color:'#92400e'}}>📦 {ric.length} ricambi{allegati.length>0?' · 📎 '+allegati.length+' allegati':''}</span>}

        <button onClick={onCancel} style={{background:'white',color:'#6b7fa3',border:'1.5px solid #d8e0f0',padding:'8px 14px',borderRadius:6,fontWeight:700,fontSize:14,cursor:'pointer'}}>Annulla</button>
        <button disabled={!valid} onClick={function(){onConfirm(pratica,allegati);}} style={{background:valid?'linear-gradient(135deg,#f59e0b,#d97706)':'#ccc',color:'white',border:'none',padding:'8px 22px',borderRadius:6,fontWeight:800,fontSize:14,cursor:valid?'pointer':'not-allowed',display:'flex',alignItems:'center',gap:6}}>

        </button>
      </div>
    </div>
  </div>);
}

// ═══ STEPPER ═══
function Stepper({curr,periziata,onChange}){
  // 8 visual steps: map real status + periziaStato to visual position
  var steps=[{n:1,l:'Gest.'},{n:2,l:'Att.Per.'},{n:2.5,l:'Periziata'},{n:3,l:'Ric.Ord.'},{n:4,l:'App.'},{n:5,l:'Lavor.'},{n:6,l:'Pronta'},{n:7,l:'Chiusa'}];
  // Calculate visual position
  var vPos=curr;
  if(curr===2&&periziata)vPos=2.5;
  if(curr>=3)vPos=curr;
return(<div style={{display:'flex',alignItems:'center',margin:'6px 0'}}>{steps.map(function(s,i){
  var iC=vPos===s.n;
  var iD=(vPos>s.n)&&curr!==8;
  var iF=s.n===7&&curr===7;
  var bg='white',bc='#d8e0f0',col='#6b7fa3',lC='#6b7fa3';
  if(iF){bg='#6b7280';bc='#4b5563';col='white';lC='#6b7280';}
  else if(iD){bg='#003087';bc='#003087';col='white';lC='#003087';}
  else if(iC){bg='#efdf00';bc='#c8b900';col='#0d1f3c';lC='#0d1f3c';}
  // Map visual step to real status for onClick
  var realN=s.n<=2?s.n:s.n===2.5?2:s.n>=3?s.n:s.n;
  if(s.n===2.5)realN=2;// periziata is still status 2
  return(<div key={s.n} style={{flex:1,minWidth:36,textAlign:'center',position:'relative'}}>
    {i>0&&<div style={{position:'absolute',top:10,left:0,width:'50%',height:2,background:iD||iC?'#003087':'#d8e0f0'}}/>}
    {i<steps.length-1&&<div style={{position:'absolute',top:10,right:0,width:'50%',height:2,background:iD?'#003087':'#d8e0f0'}}/>}
    <div style={{width:20,height:20,borderRadius:'50%',background:bg,border:'2px solid '+bc,margin:'0 auto 2px',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,color:col,position:'relative',zIndex:1,cursor:'default'}}>{iD||iF?'✓':s.n===7?'🔒':i+1}</div>
    <div style={{fontSize:10,fontWeight:iC?700:600,color:lC,textTransform:'uppercase',lineHeight:1.2}}>{s.l}</div>
  </div>);})}</div>);}

function App(){

          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:7,marginBottom:8}}>{[['#f59e0b','#92400e',pr.filter(x=>x.liqStatus==='ATT').length,'⏳ Att. Liq.',10],['#8b5cf6','#6d28d9',pr.filter(x=>x.liqStatus==='PARZ').length,'🔶 Parziale',11],['#10b981','#065f46',pr.filter(x=>x.liqStatus==='LIQ').length,'✅ Liquidato',12],['#94a3b8','#475569',pr.filter(x=>!x.liqStatus||x.liqStatus==='NONE').length,'— Non imp.',13]].map(([bc,tc,n,l,fv],i)=><div key={i} onClick={function(){setFilt(filt===fv?0:fv);}} className="card-hover" style={{background:'white',borderRadius:8,padding:10,borderTop:'3px solid '+bc,textAlign:'center',cursor:'pointer',boxShadow:filt===fv?'0 0 0 2px '+bc:'none'}}><div style={{fontSize:22,fontWeight:800,color:tc}}>{n}</div><div style={{fontSize:11,fontWeight:600,color:'#6b7fa3'}}>{l}</div></div>)}</div>
          <div style={{background:'white',borderRadius:8,padding:'10px 14px',display:'flex',gap:12,alignItems:'center',marginBottom:10,flexWrap:'wrap'}}>
            <div><div style={{fontSize:11,fontWeight:700,color:'#6b7fa3'}}>TOT. FATTURE</div><div style={{fontSize:15,fontWeight:800,color:'#065f46'}}>€ {contPr.reduce((s,x)=>s+parseFloat(x.importoTotale||0),0).toLocaleString('it-IT',{minimumFractionDigits:2})}</div></div>
            <div style={{color:'#d8e0f0'}}>|</div>
            <div><div style={{fontSize:11,fontWeight:700,color:'#6b7fa3'}}>CARICO CLIENTI</div><div style={{fontSize:15,fontWeight:800,color:'#92400e'}}>€ {contPr.reduce((s,x)=>s+parseFloat(x.importoCliente||0),0).toLocaleString('it-IT',{minimumFractionDigits:2})}</div></div>
            <div style={{color:'#d8e0f0'}}>|</div>
            <div><div style={{fontSize:11,fontWeight:700,color:'#6b7fa3'}}>CARICO CONCESS.</div><div style={{fontSize:15,fontWeight:800,color:'#d97706'}}>€ {contPr.reduce((s,x)=>s+parseFloat(x.importoConcessionaria||0),0).toLocaleString('it-IT',{minimumFractionDigits:2})}</div></div>
            <div style={{color:'#d8e0f0'}}>|</div>
            <div><div style={{fontSize:11,fontWeight:700,color:'#6b7fa3'}}>COMPAGNIE</div><div style={{fontSize:15,fontWeight:800,color:'#1d4ed8'}}>€ {contPr.reduce((s,x)=>s+parseFloat(x.importoCompagnia||0),0).toLocaleString('it-IT',{minimumFractionDigits:2})}</div></div>
          </div>
          <div style={{background:'white',borderRadius:12,overflow:'hidden',boxShadow:'0 2px 16px rgba(0,30,87,.06)',border:'1px solid rgba(0,30,87,.06)'}}>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
              <thead><tr style={{background:'#0d1f3c',color:'white'}}>{['Cliente','Targa','Compagnia','Tot. Fattura','Carico Cliente','Carico Concess.','Carico Compagnia','Stato Liq.'].map(h=><th key={h} style={{padding:'6px 8px',textAlign:'left',fontSize:12,textTransform:'uppercase'}}>{h}</th>)}</tr></thead>
              <tbody>{contPr.map(x=>{var ls=x.liqStatus||'NONE';return(
                <tr key={x.id} onClick={()=>setEPr({...x})} className="row-hover" style={{borderBottom:'1px solid #eef1f8',cursor:'pointer'}}>
                  <td style={{padding:'6px 8px',fontWeight:700}}>{x.cognome} {x.nome}</td>
                  <td style={{padding:'6px 8px'}}><span style={{fontWeight:700,background:'#0d1f3c',color:'#efdf00',padding:'1px 4px',borderRadius:2,fontSize:12}}>{x.targa}</span></td>
                  <td style={{padding:'6px 8px',fontSize:12}}>{x.company||'—'}</td>
                  <td style={{padding:'6px 8px',fontWeight:800,color:'#065f46'}}>{x.importoTotale?'€ '+parseFloat(x.importoTotale).toLocaleString('it-IT',{minimumFractionDigits:2}):'—'}</td>
                  <td style={{padding:'6px 8px',fontWeight:700,color:'#92400e'}}>{x.importoCliente?'€ '+parseFloat(x.importoCliente).toLocaleString('it-IT',{minimumFractionDigits:2}):'—'}</td>
                  <td style={{padding:'6px 8px',fontWeight:700,color:'#d97706'}}>{x.importoConcessionaria?'€ '+parseFloat(x.importoConcessionaria).toLocaleString('it-IT',{minimumFractionDigits:2}):'—'}</td>
                  <td style={{padding:'6px 8px',fontWeight:700,color:'#1d4ed8'}}>{x.importoCompagnia?'€ '+parseFloat(x.importoCompagnia).toLocaleString('it-IT',{minimumFractionDigits:2}):'—'}</td>
                  <td style={{padding:'6px 8px'}}><span style={{padding:'2px 6px',borderRadius:10,fontSize:11,fontWeight:700,background:ls==='ATT'?'#fef3c7':ls==='LIQ'?'#d1fae5':ls==='PARZ'?'#ede9fe':'#f3f4f6',color:ls==='ATT'?'#92400e':ls==='LIQ'?'#065f46':ls==='PARZ'?'#6d28d9':'#6b7fa3'}}>{ls==='ATT'?'⏳ Attesa':ls==='LIQ'?'✅ Liquidato':ls==='PARZ'?'🔶 Parziale':'—'}</span></td>
                </tr>);})}</tbody>
            </table>
            {contPr.length===0&&<div style={{padding:20,textAlign:'center',color:'#6b7fa3',fontStyle:'italic'}}>Nessuna pratica con questo filtro</div>}
          </div>
        </>);}()}
      </main>
    </div>
    {/* MODALI */}
    {ePr&&<PrModal p={ePr} onChange={setEPr} onClose={()=>setEPr(null)} onSave={p=>{setPr(pr.map(x=>x.id===p.id?p:x));toast_('Salvata');}} onDel={delPr} onConsegna={consegna} onPronta={markPronta} onInev={markInev} onAppFissato={setAppFissato} onResolve={resolveInev} onNeedCarr={(id,tg)=>setCarrPick({id,targa:tg})} onOrdinaRicambi={p=>setOrdinaPopup(p)} onFissaApp={p=>setAppPopup(p)}/>}
    {carrPick&&<CarrPicker targa={carrPick.targa} onConfirm={confirmCarr} onCancel={()=>setCarrPick(null)}/>}
    {ordinaPopup&&<OrdinaRicambiPopup pratica={ordinaPopup} onChange={setOrdinaPopup} onConfirm={confirmOrdine} onSkip={skipOrdine} onCancel={()=>setOrdinaPopup(null)}/>}
    {appPopup&&<AppuntamentoPopup pratica={appPopup} onConfirm={confirmApp} onCancel={()=>setAppPopup(null)}/>}
    {emailPopup&&<EmailPopup pratica={emailPopup} onClose={()=>setEmailPopup(null)}/>}
    {carrEmailPopup&&<CarrEmailPopup pratica={carrEmailPopup.pratica} officina={carrEmailPopup.officina} onClose={()=>setCarrEmailPopup(null)} onSkip={()=>setCarrEmailPopup(null)}/>}
    {showNuova&&<NuovaPraticaPopup onOk={creaPratica} onNo={function(){setShowNuova(false);}}/>}
    {prontoPopup&&<ProntoPopup pratica={prontoPopup} onConfirm={confirmPronto} onCancel={function(){setProntoPopup(null);}}/>}
    {periziaPopup&&<PeriziaPopup pratica={periziaPopup} onConfirm={confirmPerizia} onCancel={function(){setPeriziaPopup(null);}}/>}
    {confermaPopup&&<ConfermaPopup titolo={confermaPopup.titolo} msg={confermaPopup.msg} onOk={confermaPopup.onOk} onNo={function(){setConfermaPopup(null);}}/>}
    {toast&&<div style={{position:'fixed',bottom:20,right:20,background:'linear-gradient(135deg,#0d1f3c,#162d5a)',color:'white',padding:'12px 20px',borderRadius:10,fontSize:14,fontWeight:600,zIndex:700,borderLeft:'4px solid #efdf00',maxWidth:360,boxShadow:'0 8px 30px rgba(0,0,0,.25)',animation:'fadeIn .3s ease'}}>{toast}</div>}
  </div>);
}


ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
